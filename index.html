<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --color-bg: #f0f2f5;
        --color-card: #ffffff;
        --color-card-shadow: rgba(0, 0, 0, 0.08);
        --color-text-primary: #1a1a2e;
        --color-text-muted: #aaa;
        --color-border: #e0e0e0;
        --color-item-bg: #f8f8fb;
        --color-item-border: #e8e8f0;
        --color-item-hover: #f0f0fa;
        --color-primary: #4f46e5;
        --color-primary-hover: #4338ca;
        --color-delete: #ccc;
        --color-delete-hover: #ef4444;
        --color-delete-hover-bg: #fef2f2;
      }

      [data-theme="dark"] {
        --color-bg: #0f0f1a;
        --color-card: #1e1e2e;
        --color-card-shadow: rgba(0, 0, 0, 0.4);
        --color-text-primary: #e2e2f0;
        --color-text-muted: #6b6b8a;
        --color-border: #3a3a5c;
        --color-item-bg: #2a2a3e;
        --color-item-border: #3a3a5c;
        --color-item-hover: #32324a;
        --color-primary: #6366f1;
        --color-primary-hover: #4f46e5;
        --color-delete: #555;
        --color-delete-hover: #ef4444;
        --color-delete-hover-bg: #3a1f1f;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: var(--color-bg);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        padding: 48px 16px;
        transition: background 0.25s;
      }

      .card {
        background: var(--color-card);
        border-radius: 12px;
        box-shadow: 0 4px 24px var(--color-card-shadow);
        padding: 32px;
        width: 100%;
        max-width: 480px;
        height: fit-content;
        transition: background 0.25s, box-shadow 0.25s;
      }

      .card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
      }

      h1 {
        font-size: 1.75rem;
        font-weight: 700;
        color: var(--color-text-primary);
        letter-spacing: -0.5px;
        transition: color 0.25s;
      }

      #theme-toggle {
        background: none;
        border: 1px solid var(--color-border);
        border-radius: 8px;
        width: 38px;
        height: 38px;
        font-size: 1.1rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: border-color 0.2s, background 0.2s;
        flex-shrink: 0;
      }

      #theme-toggle:hover {
        background: var(--color-item-hover);
        border-color: var(--color-primary);
      }

      #theme-toggle:focus-visible {
        outline: 2px solid var(--color-primary);
        outline-offset: 2px;
      }

      .input-row {
        display: flex;
        gap: 8px;
        margin-bottom: 24px;
      }

      #todo-input {
        flex: 1;
        padding: 10px 14px;
        border: 2px solid var(--color-border);
        border-radius: 8px;
        font-size: 0.95rem;
        color: var(--color-text-primary);
        background: var(--color-card);
        outline: none;
        transition: border-color 0.2s, background 0.25s, color 0.25s;
      }

      #todo-input:focus {
        border-color: var(--color-primary);
      }

      #todo-input::placeholder {
        color: var(--color-text-muted);
      }

      #add-btn {
        padding: 10px 18px;
        background: var(--color-primary);
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        white-space: nowrap;
        transition: background 0.2s, transform 0.1s;
      }

      #add-btn:hover {
        background: var(--color-primary-hover);
      }

      #add-btn:active {
        transform: scale(0.97);
      }

      .empty-state {
        text-align: center;
        color: var(--color-text-muted);
        font-size: 0.9rem;
        padding: 24px 0;
        transition: color 0.25s;
      }

      #todo-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .todo-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 14px;
        background: var(--color-item-bg);
        border: 1px solid var(--color-item-border);
        border-radius: 8px;
        transition: background 0.15s;
      }

      .todo-item:hover {
        background: var(--color-item-hover);
      }

      .todo-item input[type="checkbox"] {
        width: 18px;
        height: 18px;
        accent-color: var(--color-primary);
        cursor: pointer;
        flex-shrink: 0;
      }

      .todo-text {
        flex: 1;
        font-size: 0.95rem;
        color: var(--color-text-primary);
        word-break: break-word;
        transition: color 0.2s;
      }

      .todo-item.completed .todo-text {
        text-decoration: line-through;
        color: var(--color-text-muted);
      }

      .delete-btn {
        background: none;
        border: none;
        color: var(--color-delete);
        font-size: 1.1rem;
        cursor: pointer;
        line-height: 1;
        padding: 2px 4px;
        border-radius: 4px;
        transition: color 0.2s, background 0.2s;
        flex-shrink: 0;
      }

      .delete-btn:hover {
        color: var(--color-delete-hover);
        background: var(--color-delete-hover-bg);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="card-header">
        <h1>My Todos</h1>
        <button id="theme-toggle" aria-label="Switch to dark mode" aria-pressed="false">🌙</button>
      </div>

      <div class="input-row">
        <input
          type="text"
          id="todo-input"
          placeholder="Add a new todo..."
          maxlength="200"
          aria-label="New todo text"
        />
        <button id="add-btn" aria-label="Add todo">Add</button>
      </div>

      <ul id="todo-list" aria-label="Todo list" aria-live="polite"></ul>
      <p class="empty-state" id="empty-state">No todos yet. Add one above!</p>
    </div>

    <script>
      const STORAGE_KEY = "todoAppTheme";

      function resolveInitialTheme() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved === "dark" || saved === "light") return saved;
        return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      }

      function applyTheme(theme) {
        document.documentElement.setAttribute("data-theme", theme);
        const btn = document.getElementById("theme-toggle");
        const isDark = theme === "dark";
        btn.textContent = isDark ? "☀️" : "🌙";
        btn.setAttribute("aria-label", isDark ? "Switch to light mode" : "Switch to dark mode");
        btn.setAttribute("aria-pressed", String(isDark));
      }

      function toggleTheme() {
        const current = document.documentElement.getAttribute("data-theme") ?? "light";
        const next = current === "dark" ? "light" : "dark";
        localStorage.setItem(STORAGE_KEY, next);
        applyTheme(next);
      }

      applyTheme(resolveInitialTheme());

      const input = document.getElementById("todo-input");
      const addBtn = document.getElementById("add-btn");
      const list = document.getElementById("todo-list");
      const emptyState = document.getElementById("empty-state");

      document.getElementById("theme-toggle").addEventListener("click", toggleTheme);

      function updateEmptyState() {
        emptyState.style.display = list.children.length === 0 ? "block" : "none";
      }

      function createTodoItem(text) {
        const li = document.createElement("li");
        li.className = "todo-item";

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.setAttribute("aria-label", "Mark as complete");
        checkbox.addEventListener("change", () => {
          li.classList.toggle("completed", checkbox.checked);
        });

        const span = document.createElement("span");
        span.className = "todo-text";
        span.textContent = text;

        const deleteBtn = document.createElement("button");
        deleteBtn.className = "delete-btn";
        deleteBtn.textContent = "✕";
        deleteBtn.setAttribute("aria-label", `Delete "${text}"`);
        deleteBtn.addEventListener("click", () => {
          li.remove();
          updateEmptyState();
        });

        li.append(checkbox, span, deleteBtn);
        return li;
      }

      function addTodo() {
        const text = input.value.trim();
        if (!text) return;

        list.appendChild(createTodoItem(text));
        input.value = "";
        input.focus();
        updateEmptyState();
      }

      addBtn.addEventListener("click", addTodo);

      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          addTodo();
        }
      });

      updateEmptyState();
    </script>
  </body>
</html>
