<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #f0f2f5;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        padding: 48px 16px;
      }

      .card {
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        padding: 32px;
        width: 100%;
        max-width: 480px;
        height: fit-content;
      }

      h1 {
        font-size: 1.75rem;
        font-weight: 700;
        color: #1a1a2e;
        margin-bottom: 24px;
        letter-spacing: -0.5px;
      }

      .input-row {
        display: flex;
        gap: 8px;
        margin-bottom: 24px;
      }

      #todo-input {
        flex: 1;
        padding: 10px 14px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 0.95rem;
        color: #1a1a2e;
        outline: none;
        transition: border-color 0.2s;
      }

      #todo-input:focus {
        border-color: #4f46e5;
      }

      #todo-input::placeholder {
        color: #aaa;
      }

      #add-btn {
        padding: 10px 18px;
        background: #4f46e5;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        white-space: nowrap;
        transition: background 0.2s, transform 0.1s;
      }

      #add-btn:hover {
        background: #4338ca;
      }

      #add-btn:active {
        transform: scale(0.97);
      }

      .empty-state {
        text-align: center;
        color: #aaa;
        font-size: 0.9rem;
        padding: 24px 0;
      }

      #todo-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .todo-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 14px;
        background: #f8f8fb;
        border: 1px solid #e8e8f0;
        border-radius: 8px;
        transition: background 0.15s;
      }

      .todo-item:hover {
        background: #f0f0fa;
      }

      .todo-item input[type="checkbox"] {
        width: 18px;
        height: 18px;
        accent-color: #4f46e5;
        cursor: pointer;
        flex-shrink: 0;
      }

      .todo-text {
        flex: 1;
        font-size: 0.95rem;
        color: #1a1a2e;
        word-break: break-word;
        transition: color 0.2s;
      }

      .todo-item.completed .todo-text {
        text-decoration: line-through;
        color: #aaa;
      }

      .delete-btn {
        background: none;
        border: none;
        color: #ccc;
        font-size: 1.1rem;
        cursor: pointer;
        line-height: 1;
        padding: 2px 4px;
        border-radius: 4px;
        transition: color 0.2s, background 0.2s;
        flex-shrink: 0;
      }

      .delete-btn:hover {
        color: #ef4444;
        background: #fef2f2;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>My Todos</h1>

      <div class="input-row">
        <input
          type="text"
          id="todo-input"
          placeholder="Add a new todo..."
          maxlength="200"
          aria-label="New todo text"
        />
        <button id="add-btn" aria-label="Add todo">Add</button>
      </div>

      <ul id="todo-list" aria-label="Todo list" aria-live="polite"></ul>
      <p class="empty-state" id="empty-state">No todos yet. Add one above!</p>
    </div>

    <script>
      const input = document.getElementById("todo-input");
      const addBtn = document.getElementById("add-btn");
      const list = document.getElementById("todo-list");
      const emptyState = document.getElementById("empty-state");

      function updateEmptyState() {
        emptyState.style.display = list.children.length === 0 ? "block" : "none";
      }

      function createTodoItem(text) {
        const li = document.createElement("li");
        li.className = "todo-item";

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.setAttribute("aria-label", "Mark as complete");
        checkbox.addEventListener("change", () => {
          li.classList.toggle("completed", checkbox.checked);
        });

        const span = document.createElement("span");
        span.className = "todo-text";
        span.textContent = text;

        const deleteBtn = document.createElement("button");
        deleteBtn.className = "delete-btn";
        deleteBtn.textContent = "✕";
        deleteBtn.setAttribute("aria-label", `Delete "${text}"`);
        deleteBtn.addEventListener("click", () => {
          li.remove();
          updateEmptyState();
        });

        li.append(checkbox, span, deleteBtn);
        return li;
      }

      function addTodo() {
        const text = input.value.trim();
        if (!text) return;

        list.appendChild(createTodoItem(text));
        input.value = "";
        input.focus();
        updateEmptyState();
      }

      addBtn.addEventListener("click", addTodo);

      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          addTodo();
        }
      });

      updateEmptyState();
    </script>
  </body>
</html>
